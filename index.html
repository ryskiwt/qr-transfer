<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none'; script-src 'self'; style-src 'self'; img-src 'self' blob: data:; media-src 'self' blob:; frame-src blob:; connect-src 'self' https://*.peerjs.com:* wss://*.peerjs.com:* stun: turn:"
    />
    <title>QR Transfer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./vendor/peerjs.min.js" defer></script>
    <script src="./vendor/qrcode.min.js" defer></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="app-frame" aria-live="polite">
        <header class="topbar">
          <h1 id="view-title" class="view-title">WebRTCでファイルを受信</h1>
          <span id="connection-pill" class="pill">準備中</span>
        </header>

        <section id="desktop-view" class="view" hidden>
          <div class="desktop-grid">
            <div class="qr-panel">
              <div class="qr-top-actions">
                <button id="toggle-qr" class="secondary-button" type="button" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <span>QRコードを表示</span>
                </button>
                <button id="refresh-qr" class="secondary-button" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                    <path d="M3 21v-5h5" />
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                    <path d="M21 3v5h-5" />
                  </svg>
                  <span>再発行</span>
                </button>
              </div>
              <div id="qr-wrap" class="qr-wrap">
                <div id="qr-code" class="qr-code" role="img" aria-label="スマートフォン接続用QRコード"></div>
                <div id="qr-loading" class="qr-loading">QRコードを生成中</div>
              </div>
              <div class="qr-actions">
                <p id="room-id-label" class="room-id">Room ID: 準備中</p>
                <button id="copy-share-link" class="text-link link-button" type="button" disabled>共有用リンクをコピー</button>
              </div>
            </div>

            <section id="preview-area" class="preview-area" aria-label="受信ファイルプレビュー">
              <div class="section-heading">
                <div>
                  <h2 id="preview-name">プレビュー</h2>
                  <p id="preview-detail" class="preview-detail"></p>
                </div>
                <button id="open-preview-overlay" class="icon-button" type="button" aria-label="大きくプレビューを表示" hidden>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 3H3v5" />
                    <path d="M3 3l6 6" />
                    <path d="M16 3h5v5" />
                    <path d="M21 3l-6 6" />
                    <path d="M8 21H3v-5" />
                    <path d="M3 21l6-6" />
                    <path d="M16 21h5v-5" />
                    <path d="M21 21l-6-6" />
                  </svg>
                </button>
              </div>
              <div id="preview-content" class="preview-content" data-preview-kind="empty">
                <p class="preview-empty">受信したファイルがここに表示されます。</p>
              </div>
            </section>
          </div>

          <p id="desktop-status" class="sr-only">スマートフォンからの送信を待っています</p>

          <section class="receive-area" aria-label="受信ファイル">
            <div class="section-heading">
              <h2>受信ファイル</h2>
            </div>
            <div id="transfer-list" class="transfer-list">
              <div class="empty-state">まだ受信したファイルはありません。</div>
            </div>
          </section>
        </section>

        <section id="phone-view" class="view" hidden>
          <p id="phone-status-text" class="sr-only">PCへ接続しています</p>
          <progress id="send-progress" max="100" value="0" hidden></progress>

          <div class="action-grid">
            <button id="pick-file" class="action-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <path d="M14 2v6h6" />
              </svg>
              <span>ファイルを選択 or カメラを起動</span>
            </button>
            <button id="open-app-camera" class="action-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z" />
                <circle cx="12" cy="13" r="3.5" />
              </svg>
              <span>アプリ内カメラで撮影</span>
            </button>
          </div>

          <input id="file-input" type="file" hidden />

          <section id="app-camera-panel" class="app-camera-panel" hidden>
            <div class="section-heading">
              <h2>アプリ内カメラ</h2>
            </div>
            <div class="app-camera-preview">
              <video id="app-camera-video" autoplay muted playsinline></video>
              <canvas id="app-camera-canvas" aria-hidden="true"></canvas>
            </div>
            <div class="app-camera-actions">
              <button id="close-app-camera" class="secondary-button" type="button">キャンセル</button>
              <button id="capture-app-camera" class="primary-button" type="button">撮影する</button>
            </div>
          </section>

          <section id="file-review-panel" class="file-review-panel" hidden>
            <div class="section-heading">
              <div>
                <h2 id="file-review-name">送信するファイル</h2>
                <p id="file-review-detail" class="preview-detail"></p>
              </div>
            </div>
            <div id="file-review-content" class="preview-content" data-preview-kind="empty"></div>
            <div class="file-review-actions">
              <button id="choose-another-file" class="secondary-button" type="button">選び直す</button>
              <button id="send-selected-file" class="primary-button" type="button">送信する</button>
            </div>
          </section>
        </section>

        <section id="unsupported-view" class="view" hidden>
          <p class="status-text">このブラウザではWebRTCを利用できません。</p>
        </section>
      </section>
    </main>

    <div id="preview-overlay" class="preview-overlay" role="dialog" aria-modal="true" aria-labelledby="preview-overlay-title" hidden>
      <section class="preview-overlay-panel">
        <header class="preview-overlay-header">
          <div>
            <h2 id="preview-overlay-title">プレビュー</h2>
            <p id="preview-overlay-detail" class="preview-detail"></p>
          </div>
          <button id="close-preview-overlay" class="icon-button" type="button" aria-label="プレビューを閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6L6 18" />
              <path d="M6 6l12 12" />
            </svg>
          </button>
        </header>
        <div id="preview-overlay-content" class="preview-content preview-overlay-content" data-preview-kind="empty"></div>
      </section>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
