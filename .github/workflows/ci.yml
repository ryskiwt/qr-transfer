name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check syntax
        run: npm run check

      - name: Run unit tests
        run: npm test

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build Pages site
        run: npm run build:pages

      - name: Generate SBOM and checksums
        run: npm run release:metadata

      - name: Attest Pages files
        uses: actions/attest@v4
        with:
          subject-checksums: site.sha256

      - name: Attest Pages SBOM
        uses: actions/attest@v4
        with:
          subject-checksums: site.sha256
          sbom-path: qr-transfer-site.spdx.json

      - name: Upload verification metadata
        uses: actions/upload-artifact@v6
        with:
          name: qr-transfer-verification-metadata
          path: |
            site.sha256
            qr-transfer-site.spdx.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
